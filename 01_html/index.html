<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meat name="vieewport" content="width, initial-scale=1.0">
        <title>ジムLP</title>

        <link rel="stylesheet" href="../02_css/style.css">
    
    </head>

 <body>

    <!-- ファーストビュー -->
    <section class="fv">
      <h1>3ヶ月で理想の体へ</h1>
      <p>完全個別指導のパーソナルジム</p>
      <button>無料体験はこちら</button>
    </section>

    <!-- 特徴 -->
    <section class="features">
      <h2>選ばれる理由</h2>

      <div class="features-list">
        <div class="feature">
            <h3>完全個別トレーニング</h3>
            <p>あなた専用のプログラムで最短で結果へ</p>
        </div>

        <div class="feature">
            <h3>食事サポート付き</h3>
            <p>無理のない食事制限でリバウンド防止</p>
        </div>

        <div class="feature">
            <h3>短期間で結果</h3>
            <p>3ヶ月で理想の体へ導きます</p>
        </div>
      </div>
    </section>

    <!--お客様の声-->
    <section class="voices">
      <h2>お客様の声</h2>

      <div class="voice-list">

        <div class="voice">
          <p>「3ヶ月で-8kg達成!」</p>
          <span>30代 男性</span>
        </div>

        <div class="voice">
          <p>「無理なく続けられました」</p>
          <span>20代 女性</span>
        </div>

        <div class="voice">
          <p>「人生変わりました！」</p>
          <span>40代 男性</span>
        </div>

      </div>
    </section>

    <!-- 料金 -->
    <section class="price">
      <h2>料金</h2>
      <p>月額 ¥29,800</p>
    </section>


    <!-- CTA -->
    <section class="cta">
      <h2>今なら無料体験受付中</h2>
      <p>先着10名限定</p>
      <button class="cta-btn">無料体験を予約する</button>
    </section>

    <footer>
      <p>© 2026 Gym LP</p>
    </footer>

</body>
</html>
